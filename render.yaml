databases:
  - name: smarthire-db
    databaseName: smarthire
    user: smarthire

services:
  - type: web
    name: smarthire-backend
    env: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smarthire-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ENVIRONMENT
        value: "production"
      - key: CORS_ORIGINS
        value: '["https://smarthire-frontend.vercel.app"]'
